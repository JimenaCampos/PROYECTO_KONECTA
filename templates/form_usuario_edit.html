{% extends 'form_base.html' %}
{% block title %} · Editar usuario{% endblock %}
{% block content %}
<div class="ph">
  <div class="ph-left">
    <h1>Editar usuario</h1>
    <p>{{ user.nombre }}</p>
  </div>
  <div class="ph-right">
    <a href="{{ url_for('usuarios', usuario_id=id_del_usuario) }}" class="btn">← Volver</a>
  </div>
</div>

{% if error %}<div class="alert alert-e"><span>!</span> {{ error }}</div>{% endif %}

<div class="card" style="max-width:520px;margin:0 auto;">
  <form action="{{ url_for('editar_usuario', usuario_id=id_del_usuario, id_usuario=user.id) }}" method="POST">
    <div class="fg">
      <label>Nombre completo <span style="color:#B91C1C">*</span></label>
      <input class="fc" type="text" name="nombre" value="{{ user.nombre }}" required>
    </div>
    <div class="fg">
      <label>Correo electrónico <span style="color:#B91C1C">*</span></label>
      <input class="fc" type="email" name="correo" value="{{ user.correo }}" required>
    </div>
    <div class="fg2">
      <div class="fg">
        <label>Celular <span class="opt">(opcional)</span></label>
        <input class="fc" type="text" name="celular" value="{{ user.celular or '' }}">
      </div>
      <div class="fg">
        <label>Rol</label>
        <select class="fc" name="rol_id">
          {% for r in roles %}
          <option value="{{ r.id }}" {% if user.rol_id == r.id %}selected{% endif %}>{{ r.nombre }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="alert alert-i" style="font-size:12px;"><span>ℹ</span> Puedes modificar el nombre, correo, celular y rol del usuario.</div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-p" type="submit">Guardar cambios</button>
      <a href="{{ url_for('usuarios', usuario_id=id_del_usuario) }}" class="btn">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
